<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin - Páginas do Projeto | DevChat</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%236d44f7'/%3E%3Cpath d='M17 5 8 18h6l-1 9 9-13h-6z' fill='white'/%3E%3C/svg%3E" />
<style>
:root {
  --purple-600: #6d44f7;
  --purple-700: #5a30e0;
  --emerald-500: #10c684;
  --slate-900: #1a2238;
  --slate-700: #3a455f;
  --slate-500: #6b7690;
  --slate-200: #e4e8f1;
  --slate-100: #eef1f7;
  --bg: #ffffff;
  --bg-soft: #f7f8fc;
  --radius: 18px;
  --shadow-sm: 0 1px 2px rgba(11,16,32,.06), 0 2px 8px rgba(11,16,32,.04);
  --shadow-md: 0 8px 30px rgba(11,16,32,.08);
}

* { box-sizing: border-box; margin: 0; }
body {
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg-soft);
  color: var(--slate-900);
  line-height: 1.6;
  padding: 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

header {
  background: white;
  border-radius: var(--radius);
  padding: 30px;
  margin-bottom: 30px;
  box-shadow: var(--shadow-sm);
}

h1 {
  font-size: 32px;
  font-weight: 800;
  color: var(--slate-900);
  margin-bottom: 8px;
}

.subtitle {
  color: var(--slate-500);
  font-size: 16px;
}

.stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-bottom: 30px;
}

.stat-card {
  background: white;
  border-radius: 14px;
  padding: 24px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--slate-200);
}

.stat-card .label {
  font-size: 13px;
  font-weight: 600;
  color: var(--slate-500);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}

.stat-card .value {
  font-size: 36px;
  font-weight: 800;
  color: var(--purple-600);
}

.search-box {
  background: white;
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-sm);
}

.search-box input {
  width: 100%;
  padding: 14px 18px;
  border: 1.5px solid var(--slate-200);
  border-radius: 12px;
  font-size: 15px;
  font-family: inherit;
}

.search-box input:focus {
  outline: none;
  border-color: var(--purple-600);
  box-shadow: 0 0 0 3px rgba(109, 68, 247, 0.1);
}

.pages-grid {
  display: grid;
  gap: 16px;
}

.page-card {
  background: white;
  border-radius: 14px;
  padding: 24px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--slate-200);
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
}

.page-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
  border-color: var(--purple-600);
}

.page-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 12px;
}

.page-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--slate-900);
  margin-bottom: 4px;
}

.page-type {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}

.page-type.main {
  background: linear-gradient(135deg, var(--purple-600), var(--emerald-500));
  color: white;
}

.page-type.landing {
  background: #e9e3ff;
  color: var(--purple-700);
}

.page-type.compact {
  background: #e9fbf3;
  color: #0aa86e;
}

.page-description {
  color: var(--slate-500);
  font-size: 14px;
  margin-bottom: 16px;
}

.page-urls {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.url-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--bg-soft);
  border-radius: 8px;
  font-size: 14px;
  font-family: 'Monaco', 'Courier New', monospace;
}

.url-label {
  font-weight: 600;
  color: var(--slate-700);
  min-width: 80px;
}

.url-path {
  color: var(--purple-600);
  flex: 1;
  word-break: break-all;
}

.url-item a {
  color: var(--purple-600);
  text-decoration: none;
  transition: color 0.15s;
}

.url-item a:hover {
  color: var(--purple-700);
  text-decoration: underline;
}

.copy-btn {
  padding: 6px 12px;
  background: var(--purple-600);
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
}

.copy-btn:hover {
  background: var(--purple-700);
}

.copy-btn.copied {
  background: var(--emerald-500);
}

.icon {
  width: 16px;
  height: 16px;
  display: inline-block;
  vertical-align: middle;
}

footer {
  margin-top: 40px;
  padding: 20px;
  text-align: center;
  color: var(--slate-500);
  font-size: 14px;
}

.no-results {
  text-align: center;
  padding: 60px 20px;
  color: var(--slate-500);
}

@media (max-width: 768px) {
  .stats {
    grid-template-columns: 1fr;
  }
  
  .page-header {
    flex-direction: column;
  }
  
  .url-item {
    flex-direction: column;
    align-items: flex-start;
  }
  
  .url-label {
    min-width: auto;
  }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🔧 Admin - Páginas do Projeto</h1>
    <p class="subtitle">Visão geral de todas as páginas e URLs do projeto DevChat</p>
  </header>

  <div class="stats">
    <div class="stat-card">
      <div class="label">Total de Páginas</div>
      <div class="value" id="totalPages">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Páginas Principais</div>
      <div class="value" id="mainPages">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Landing Pages</div>
      <div class="value" id="landingPages">0</div>
    </div>
    <div class="stat-card">
      <div class="label">Versões Compactas</div>
      <div class="value" id="compactPages">0</div>
    </div>
  </div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="🔍 Buscar por nome, URL ou descrição..." />
  </div>

  <div class="pages-grid" id="pagesGrid"></div>

  <footer>
    <p>DevChat - Multiatendimento no WhatsApp | © 2026 DevZapp</p>
  </footer>
</div>

<script>
const baseUrl = 'https://www.devzapp.com.br';

const pages = [
  {
    name: 'Página Principal',
    type: 'main',
    description: 'Landing page principal do DevChat com todos os recursos, planos e informações completas',
    file: 'index.html',
    urls: {
      production: '/',
      local: '/index.html'
    }
  },
  {
    name: 'Admin',
    type: 'main',
    description: 'Painel administrativo para visualizar todas as páginas e URLs do projeto',
    file: 'admin/index.html',
    urls: {
      production: '/admin',
      local: '/admin/index.html'
    }
  },
  {
    name: 'Modelo Base',
    type: 'main',
    description: 'Template base para criação de novas páginas do projeto',
    file: '_modelo/index.html',
    urls: {
      production: '/_modelo',
      local: '/_modelo/index.html'
    }
  },
  {
    name: 'Landing Page - Contabilidade',
    type: 'landing',
    description: 'Landing page específica para o segmento de contabilidade com conteúdo direcionado',
    file: 'contabilidade/index.html',
    urls: {
      production: '/contabilidade',
      local: '/contabilidade/index.html'
    }
  },
  {
    name: 'Landing Page - Contabilidade (Compacta)',
    type: 'compact',
    description: 'Versão compacta da landing page de contabilidade, otimizada para conversão rápida',
    file: 'contabilidade-compacta/index.html',
    urls: {
      production: '/contabilidade-compacta',
      local: '/contabilidade-compacta/index.html'
    }
  },
  {
    name: 'Landing Page Compacta',
    type: 'compact',
    description: 'Versão compacta genérica da landing page, focada em conversão direta',
    file: 'compacta/index.html',
    urls: {
      production: '/compacta',
      local: '/compacta/index.html'
    }
  },
  {
    name: 'Landing Page P1',
    type: 'landing',
    description: 'Primeira variação de landing page para testes A/B',
    file: 'p1/index.html',
    urls: {
      production: '/p1',
      local: '/p1/index.html'
    }
  },
  {
    name: 'Landing Page P1 (Compacta)',
    type: 'compact',
    description: 'Versão compacta da landing page P1',
    file: 'p1-compacta/index.html',
    urls: {
      production: '/p1-compacta',
      local: '/p1-compacta/index.html'
    }
  },
  {
    name: 'Landing Page P2',
    type: 'landing',
    description: 'Segunda variação de landing page para testes A/B',
    file: 'p2/index.html',
    urls: {
      production: '/p2',
      local: '/p2/index.html'
    }
  },
  {
    name: 'Landing Page P2 (Compacta)',
    type: 'compact',
    description: 'Versão compacta da landing page P2',
    file: 'p2-compacta/index.html',
    urls: {
      production: '/p2-compacta',
      local: '/p2-compacta/index.html'
    }
  },
  {
    name: 'Landing Page P3',
    type: 'landing',
    description: 'Terceira variação de landing page para testes A/B',
    file: 'p3/index.html',
    urls: {
      production: '/p3',
      local: '/p3/index.html'
    }
  },
  {
    name: 'Landing Page P3 (Compacta)',
    type: 'compact',
    description: 'Versão compacta da landing page P3',
    file: 'p3-compacta/index.html',
    urls: {
      production: '/p3-compacta',
      local: '/p3-compacta/index.html'
    }
  },
  {
    name: 'Landing Page PG1',
    type: 'landing',
    description: 'Landing page PG1 - variação adicional para testes',
    file: 'pg1/index.html',
    urls: {
      production: '/pg1',
      local: '/pg1/index.html'
    }
  }
];

function updateStats() {
  const total = pages.length;
  const main = pages.filter(p => p.type === 'main').length;
  const landing = pages.filter(p => p.type === 'landing').length;
  const compact = pages.filter(p => p.type === 'compact').length;

  document.getElementById('totalPages').textContent = total;
  document.getElementById('mainPages').textContent = main;
  document.getElementById('landingPages').textContent = landing;
  document.getElementById('compactPages').textContent = compact;
}

function copyToClipboard(text, button) {
  navigator.clipboard.writeText(text).then(() => {
    const originalText = button.textContent;
    button.textContent = '✓ Copiado!';
    button.classList.add('copied');
    
    setTimeout(() => {
      button.textContent = originalText;
      button.classList.remove('copied');
    }, 2000);
  }).catch(err => {
    console.error('Erro ao copiar:', err);
    alert('Erro ao copiar para área de transferência');
  });
}

function renderPages(pagesToRender = pages) {
  const grid = document.getElementById('pagesGrid');
  
  if (pagesToRender.length === 0) {
    grid.innerHTML = '<div class="no-results">Nenhuma página encontrada com os critérios de busca.</div>';
    return;
  }
  
  grid.innerHTML = pagesToRender.map(page => `
    <div class="page-card">
      <div class="page-header">
        <div>
          <h2 class="page-title">${page.name}</h2>
          <span class="page-type ${page.type}">${page.type === 'main' ? 'Principal' : page.type === 'landing' ? 'Landing' : 'Compacta'}</span>
        </div>
      </div>
      <p class="page-description">${page.description}</p>
      <div class="page-urls">
        <div class="url-item">
          <span class="url-label">Arquivo:</span>
          <code class="url-path">${page.file}</code>
        </div>
        <div class="url-item">
          <span class="url-label">URL Prod:</span>
          <a href="${baseUrl}${page.urls.production}" target="_blank" class="url-path">${baseUrl}${page.urls.production}</a>
          <button class="copy-btn" onclick="copyToClipboard('${baseUrl}${page.urls.production}', this)">Copiar</button>
        </div>
        <div class="url-item">
          <span class="url-label">URL Local:</span>
          <code class="url-path">${page.urls.local}</code>
          <button class="copy-btn" onclick="copyToClipboard('${page.urls.local}', this)">Copiar</button>
        </div>
      </div>
    </div>
  `).join('');
}

function setupSearch() {
  const searchInput = document.getElementById('searchInput');
  
  searchInput.addEventListener('input', (e) => {
    const searchTerm = e.target.value.toLowerCase();
    
    if (!searchTerm) {
      renderPages(pages);
      return;
    }
    
    const filtered = pages.filter(page => 
      page.name.toLowerCase().includes(searchTerm) ||
      page.description.toLowerCase().includes(searchTerm) ||
      page.file.toLowerCase().includes(searchTerm) ||
      page.urls.production.toLowerCase().includes(searchTerm) ||
      page.urls.local.toLowerCase().includes(searchTerm) ||
      page.type.toLowerCase().includes(searchTerm)
    );
    
    renderPages(filtered);
  });
}

// Inicializar
updateStats();
renderPages();
setupSearch();

// Tornar a função copyToClipboard global
window.copyToClipboard = copyToClipboard;
</script>
</body>
</html>
