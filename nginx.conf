server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Atrás do proxy do Cloud Run: evita vazar ":8080"/http nos redirects de
    # diretório (ex.: /p1 -> /p1/). Redirect relativo preserva https + host.
    absolute_redirect off;
    port_in_redirect off;

    # Compressão
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Assets com cache longo
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML com cache curto
    location = /index.html {
        add_header Cache-Control "public, max-age=300";
    }

    # Clean URLs por pasta: /pg1 -> /pg1/ -> pg1/index.html
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }
}
